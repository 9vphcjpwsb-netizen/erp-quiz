<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ERP 財務模組測驗</title>
  <style>
    :root {
      --bg: #f7f7f5;
      --card: rgba(255, 255, 255, 0.86);
      --card-solid: #ffffff;
      --text: #2b2b2b;
      --muted: #737373;
      --soft: #a3a3a3;
      --line: rgba(38, 38, 38, 0.10);
      --line-strong: rgba(38, 38, 38, 0.18);
      --shadow: 0 16px 48px rgba(15, 23, 42, 0.06);
      --radius: 22px;
      --radius-sm: 14px;
      --ok: #166534;
      --ok-bg: #ecfdf3;
      --bad: #991b1b;
      --bad-bg: #fff1f2;
      --warn: #854d0e;
      --warn-bg: #fffbeb;
      --accent: #44403c;
      --accent-bg: #efede9;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.98), rgba(247,247,245,0.6) 36%, transparent 62%),
        linear-gradient(135deg, #f8f8f6 0%, #f2f1ee 100%);
      color: var(--text);
      letter-spacing: 0.01em;
    }

    button, input, select {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: min(1080px, 100%);
      margin: 0 auto;
      padding: 20px 16px 44px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      margin: 10px 0 18px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.65);
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 7vw, 54px);
      line-height: 1.03;
      letter-spacing: -0.06em;
      color: #262626;
    }

    .subtitle {
      margin: 12px 0 0;
      color: var(--muted);
      line-height: 1.75;
      max-width: 720px;
      font-size: 15px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 12px;
      margin: 18px 0;
    }

    .stat {
      padding: 16px;
      min-height: 112px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .stat .label {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .stat .value {
      margin-top: 12px;
      font-size: 24px;
      font-weight: 750;
      letter-spacing: -0.04em;
    }

    .stat .hint {
      margin-top: 6px;
      color: var(--soft);
      font-size: 12px;
      line-height: 1.35;
    }

    .section {
      padding: 18px;
      margin-top: 14px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    h2 {
      margin: 0;
      font-size: 19px;
      letter-spacing: -0.03em;
    }

    h3 {
      margin: 0;
      font-size: 16px;
      letter-spacing: -0.02em;
    }

    .controls {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 14px;
      align-items: stretch;
    }

    .control-card {
      padding: 16px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.62);
    }

    .field-label {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .choice-btn {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--card-solid);
      color: var(--text);
      border-radius: 16px;
      padding: 14px 12px;
      text-align: left;
      cursor: pointer;
      transition: transform .25s ease, border-color .25s ease, background .25s ease, box-shadow .25s ease;
    }

    .choice-btn:hover {
      transform: translateY(-1px);
      border-color: var(--line-strong);
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.05);
    }

    .choice-btn.active {
      background: var(--accent-bg);
      border-color: rgba(68, 64, 60, 0.25);
    }

    .choice-btn strong {
      display: block;
      font-size: 15px;
      margin-bottom: 5px;
    }

    .choice-btn span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .qty-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    input[type="number"],
    input[type="text"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 13px 14px;
      background: var(--card-solid);
      outline: none;
    }

    input[type="number"]:focus,
    input[type="text"]:focus {
      border-color: rgba(68, 64, 60, 0.45);
      box-shadow: 0 0 0 4px rgba(68,64,60,0.08);
    }

    .quick-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .range-panel {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--card-solid);
      color: var(--text);
      padding: 8px 12px;
      cursor: pointer;
      transition: all .2s ease;
      font-size: 13px;
    }

    .pill:hover {
      border-color: var(--line-strong);
      transform: translateY(-1px);
    }

    .primary, .secondary, .danger {
      border: 1px solid transparent;
      border-radius: 16px;
      padding: 13px 16px;
      cursor: pointer;
      transition: transform .2s ease, box-shadow .2s ease, background .2s ease, border-color .2s ease;
      min-height: 48px;
      font-weight: 650;
    }

    .primary {
      background: #2f2f2f;
      color: #fff;
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.12);
    }

    .primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 36px rgba(15, 23, 42, 0.16);
    }

    .secondary {
      background: var(--card-solid);
      border-color: var(--line);
      color: var(--text);
    }

    .danger {
      background: #fff;
      color: var(--bad);
      border-color: rgba(153,27,27,0.18);
    }

    .danger:hover {
      background: var(--bad-bg);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 16px;
    }

    .note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .progress-wrap {
      margin-top: 10px;
      height: 10px;
      background: rgba(38,38,38,0.06);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .progress-bar {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #525252, #a8a29e);
      border-radius: 999px;
      transition: width .35s ease;
    }

    .hidden {
      display: none !important;
    }

    .quiz-topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      margin: -20px -16px 16px;
      padding: 12px 16px;
      background: rgba(247,247,245,0.88);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(18px);
    }

    .topbar-inner {
      width: min(1080px, 100%);
      margin: 0 auto;
      display: flex;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
    }

    .page-dots {
      display: flex;
      gap: 7px;
      overflow-x: auto;
      padding: 4px 0;
    }

    .page-dot {
      min-width: 38px;
      height: 36px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--card-solid);
      cursor: pointer;
      color: var(--muted);
    }

    .page-dot.active {
      background: #2f2f2f;
      color: #fff;
      border-color: #2f2f2f;
    }

    .quiz-meta {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .questions-stack {
      display: grid;
      gap: 12px;
    }

    .question-card {
      padding: 16px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--card-solid);
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.035);
      scroll-margin-top: 88px;
    }

    .q-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .q-title {
      font-size: 16px;
      line-height: 1.75;
      margin-bottom: 13px;
      color: #262626;
      white-space: pre-line;
    }

    .options {
      display: grid;
      gap: 9px;
    }

    .option {
      display: grid;
      grid-template-columns: 36px 1fr;
      align-items: start;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      background: #fff;
      cursor: pointer;
      line-height: 1.55;
      transition: border-color .2s ease, background .2s ease, transform .2s ease;
    }

    .option:hover {
      border-color: var(--line-strong);
      transform: translateY(-1px);
    }

    .option.selected {
      background: var(--accent-bg);
      border-color: rgba(68,64,60,0.26);
    }

    .option-key {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(38,38,38,0.06);
      font-weight: 750;
      font-size: 13px;
    }

    .option-text {
      padding-top: 3px;
    }

    .quiz-nav {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .missing-box {
      margin-top: 14px;
      padding: 14px;
      border: 1px solid rgba(133,77,14,0.2);
      background: var(--warn-bg);
      color: var(--warn);
      border-radius: 18px;
    }

    .missing-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .mini-btn {
      border: 1px solid rgba(133,77,14,0.2);
      color: var(--warn);
      background: #fff;
      border-radius: 999px;
      padding: 8px 11px;
      cursor: pointer;
      font-size: 13px;
    }

    .result-summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 12px;
      margin: 16px 0;
    }

    .result-card {
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.72);
      border: 1px solid var(--line);
    }

    .result-card .label {
      color: var(--muted);
      font-size: 13px;
    }

    .result-card .value {
      margin-top: 8px;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .result-list {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .result-item {
      padding: 16px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--card-solid);
    }

    .result-item.correct {
      border-color: rgba(22,101,52,0.2);
    }

    .result-item.wrong {
      border-color: rgba(153,27,27,0.18);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 12px;
      font-weight: 650;
      border: 1px solid var(--line);
      background: #fff;
    }

    .badge.ok {
      color: var(--ok);
      background: var(--ok-bg);
      border-color: rgba(22,101,52,0.16);
    }

    .badge.bad {
      color: var(--bad);
      background: var(--bad-bg);
      border-color: rgba(153,27,27,0.16);
    }

    .answer-line {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .result-option {
      margin-top: 8px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      line-height: 1.55;
      display: grid;
      grid-template-columns: 34px 1fr auto;
      gap: 8px;
      align-items: start;
    }

    .result-option.is-correct {
      background: var(--ok-bg);
      border-color: rgba(22,101,52,0.18);
    }

    .result-option.is-user-wrong {
      background: var(--bad-bg);
      border-color: rgba(153,27,27,0.18);
    }

    .empty-state {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      background: rgba(255,255,255,0.5);
    }

    .footer-note {
      margin-top: 18px;
      color: var(--soft);
      font-size: 12px;
      line-height: 1.6;
      text-align: center;
    }

    @media (max-width: 860px) {
      .hero {
        flex-direction: column;
      }
      .dashboard {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .controls {
        grid-template-columns: 1fr;
      }
      .result-summary {
        grid-template-columns: repeat(2, minmax(0,1fr));
      }
    }

    @media (max-width: 520px) {
      .app {
        padding: 16px 12px 36px;
      }
      .dashboard {
        gap: 9px;
      }
      .stat {
        padding: 13px;
        min-height: 100px;
      }
      .stat .value {
        font-size: 21px;
      }
      .section {
        padding: 14px;
      }
      .mode-grid {
        grid-template-columns: 1fr;
      }
      .topbar-inner {
        align-items: stretch;
        flex-direction: column;
      }
      .quiz-meta {
        white-space: normal;
      }
      .result-summary {
        grid-template-columns: 1fr;
      }
      .result-option {
        grid-template-columns: 32px 1fr;
      }
      .result-option .badge {
        grid-column: 2;
        width: fit-content;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="homeView">
      <div class="hero">
        <div>
          <div class="eyebrow">個人題庫練習 · 本機紀錄</div>
          <h1>ERP 財務模組測驗</h1>
          <p class="subtitle">每次做完才看答案。題目連續答對 3 次後會自動視為已掌握，之後不再出現，直到你重置全部進度。</p>
        </div>
      </div>

      <div class="dashboard" id="dashboard"></div>

      <section class="panel section">
        <div class="section-title">
          <h2>開始測驗</h2>
          <span class="note" id="remainingHint"></span>
        </div>

        <div class="controls">
          <div class="control-card">
            <label class="field-label">測驗模式</label>
            <div class="mode-grid">
              <button class="choice-btn active" data-mode="random" id="modeRandom" type="button">
                <strong>隨機抽題</strong>
                <span>從尚未掌握的題目中隨機抽出。</span>
              </button>
              <button class="choice-btn" data-mode="order" id="modeOrder" type="button">
                <strong>依題號順序</strong>
                <span>按照題號由小到大，並跳過已掌握題目。</span>
              </button>
              <button class="choice-btn" data-mode="range" id="modeRange" type="button">
                <strong>指定題號區間</strong>
                <span>輸入像 1-10，已掌握題目也會出現。</span>
              </button>
            </div>
            <div class="range-panel hidden" id="rangePanel">
              <label class="field-label" for="questionRange">指定題號區間</label>
              <input id="questionRange" type="text" inputmode="text" placeholder="例如：1-10" />
              <p class="note">指定區間不會跳過已掌握題目；答錯仍會把該題連續答對次數清零。</p>
            </div>
          </div>

          <div class="control-card">
            <label class="field-label" for="questionCount">本次題數</label>
            <div class="qty-row">
              <input id="questionCount" type="number" min="1" step="1" value="30" inputmode="numeric" />
              <button class="secondary" id="startBtn" type="button">開始</button>
            </div>
            <div class="quick-buttons">
              <button class="pill" type="button" data-count="10">10 題</button>
              <button class="pill" type="button" data-count="20">20 題</button>
              <button class="pill" type="button" data-count="30">30 題</button>
              <button class="pill" type="button" data-count="50">50 題</button>
              <button class="pill" type="button" data-count="100">100 題</button>
              <button class="pill" type="button" id="allRemainingBtn">全部可練習</button>
            </div>
            <p class="note" id="countNote">每 10 題顯示一頁；交卷後才會顯示答案。</p>
          </div>
        </div>

        <div class="actions">
          <button class="danger" id="resetBtn" type="button">重置全部進度</button>
          <span class="note">紀錄只存在目前這個瀏覽器，不會上傳到任何地方。</span>
        </div>
      </section>

      <p class="footer-note">Built for GitHub Pages · 單一靜態 HTML 檔案</p>
    </section>

    <section id="quizView" class="hidden">
      <div class="quiz-topbar">
        <div class="topbar-inner">
          <div class="quiz-meta" id="quizMeta"></div>
          <div class="page-dots" id="pageDots"></div>
        </div>
      </div>

      <section class="panel section">
        <div class="section-title">
          <h2 id="quizTitle">測驗中</h2>
          <button class="secondary" id="quitBtn" type="button">返回首頁</button>
        </div>

        <div id="questionsContainer" class="questions-stack"></div>

        <div id="missingBox" class="missing-box hidden">
          <strong>還有題目沒有作答</strong>
          <div class="note">點題號可以直接跳回那一題。未作答如果仍然交卷，會算錯。</div>
          <div class="missing-list" id="missingList"></div>
          <div class="actions">
            <button class="primary" id="forceSubmitBtn" type="button">仍然交卷</button>
            <button class="secondary" id="hideMissingBtn" type="button">回去作答</button>
          </div>
        </div>

        <div class="quiz-nav">
          <button class="secondary" id="prevPageBtn" type="button">上一頁</button>
          <div class="note" id="pageInfo"></div>
          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button class="secondary" id="nextPageBtn" type="button">下一頁</button>
            <button class="primary" id="submitBtn" type="button">交卷</button>
          </div>
        </div>
      </section>
    </section>

    <section id="resultView" class="hidden">
      <section class="panel section">
        <div class="section-title">
          <div>
            <h2>本次結果</h2>
            <p class="note" id="resultDate" style="margin:6px 0 0;"></p>
          </div>
          <button class="secondary" id="backHomeBtn" type="button">回首頁</button>
        </div>

        <div class="result-summary" id="resultSummary"></div>

        <div class="actions">
          <button class="secondary" id="toggleWrongBtn" type="button">只顯示本次錯題</button>
          <button class="primary" id="restartSameModeBtn" type="button">再做一次</button>
        </div>

        <div id="resultList" class="result-list"></div>
      </section>
    </section>
  </main>

  <script>
    const QUESTIONS = [
  {
    "id": 1,
    "question": "影響銀行存款異動單據確認後,將存款餘額回饋於哪?",
    "options": {
      "A": "行事曆建立作業",
      "B": "財務參數設定作業",
      "C": "單據性質設定作業",
      "D": "銀行帳號建立作業"
    },
    "answer": "D"
  },
  {
    "id": 2,
    "question": "關於財務參數設定中的『會計現行年度、期別』描述,下列何者有誤?",
    "options": {
      "A": "目前系統處理會計帳務的期別",
      "B": "系統上線後須透過月底結轉作業來更新年度期別",
      "C": "現行年月前的會計傳票皆不可有新增修改",
      "D": "上線前須手動設定會計系統的現行年度期別"
    },
    "answer": "C"
  },
  {
    "id": 3,
    "question": "ERP系統之會計傳票建立作業,以下功能說明何者有誤?",

    const STORAGE_KEY = "erpQuizProgress.v1";
    const PAGE_SIZE = 10;
    const MASTER_STREAK = 3;

    let selectedMode = "random";
    let currentExam = null;
    let currentPage = 0;
    let lastResult = null;
    let resultWrongOnly = false;

    const $ = (id) => document.getElementById(id);

    function defaultStore() {
      return {
        totalAnswered: 0,
        totalCorrect: 0,
        lastScore: null,
        progress: {}
      };
    }

    function loadStore() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return defaultStore();
        const parsed = JSON.parse(raw);
        return {
          ...defaultStore(),
          ...parsed,
          progress: parsed.progress || {}
        };
      } catch (error) {
        return defaultStore();
      }
    }

    function saveStore(store) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(store));
    }

    function getProgress(store, id) {
      const key = String(id);
      if (!store.progress[key]) {
        store.progress[key] = { attempts: 0, correct: 0, wrongEver: false, correctStreak: 0 };
      }
      return store.progress[key];
    }

    function isMastered(store, id) {
      return (store.progress[String(id)]?.correctStreak || 0) >= MASTER_STREAK;
    }

    function eligibleQuestions(store) {
      return QUESTIONS.filter(q => !isMastered(store, q.id));
    }

    function pct(n, d) {
      if (!d) return "0%";
      return Math.round((n / d) * 100) + "%";
    }

    function formatDate(iso) {
      if (!iso) return "尚未測驗";
      const d = new Date(iso);
      return d.toLocaleString("zh-TW", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
    }

    function renderDashboard() {
      const store = loadStore();
      const mastered = QUESTIONS.filter(q => isMastered(store, q.id)).length;
      const remaining = QUESTIONS.length - mastered;
      const wrongCount = QUESTIONS.filter(q => {
        const p = store.progress[String(q.id)];
        return p && p.wrongEver && (p.correctStreak || 0) < MASTER_STREAK;
      }).length;

      $("dashboard").innerHTML = [
        statCard("總題數", QUESTIONS.length, "PDF 題庫已匯入"),
        statCard("已作答題數", store.totalAnswered, "包含重複練習"),
        statCard("答對率", pct(store.totalCorrect, store.totalAnswered), `${store.totalCorrect} / ${store.totalAnswered || 0}`),
        statCard("目前錯題數", wrongCount, "曾答錯且尚未掌握"),
        statCard("已掌握題數", mastered, `連續答對 ${MASTER_STREAK} 次`),
        statCard("最近一次成績", store.lastScore ? `${store.lastScore.score} / ${store.lastScore.total}` : "—", store.lastScore ? `${store.lastScore.percent} · ${formatDate(store.lastScore.date)}` : "尚未測驗")
      ].join("");

      $("remainingHint").textContent = `剩餘未掌握 ${remaining} 題`;
      const allBtn = $("allRemainingBtn");
      allBtn.textContent = `全部可練習（${remaining}）`;
    }

    function statCard(label, value, hint) {
      return `<div class="stat panel">
        <div class="label">${escapeHtml(label)}</div>
        <div>
          <div class="value">${escapeHtml(String(value))}</div>
          <div class="hint">${escapeHtml(String(hint))}</div>
        </div>
      </div>`;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function setView(view) {
      $("homeView").classList.toggle("hidden", view !== "home");
      $("quizView").classList.toggle("hidden", view !== "quiz");
      $("resultView").classList.toggle("hidden", view !== "result");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function modeLabel(mode) {
      if (mode === "random") return "隨機抽題";
      if (mode === "order") return "依題號順序";
      if (mode === "range") return "指定題號區間";
      return "測驗";
    }

    function updateModeUI() {
      const isRange = selectedMode === "range";
      const rangePanel = $("rangePanel");
      if (rangePanel) rangePanel.classList.toggle("hidden", !isRange);
      const countNote = $("countNote");
      if (countNote) {
        countNote.textContent = isRange
          ? "指定題號區間會忽略本次題數，直接使用你輸入的範圍。"
          : "每 10 題顯示一頁；交卷後才會顯示答案。";
      }
    }

    function parseQuestionRange(raw) {
      const text = String(raw || "").trim();
      const match = text.match(/^(\d+)\s*-\s*(\d+)$/);
      if (!match) return null;
      let start = Number(match[1]);
      let end = Number(match[2]);
      if (!Number.isInteger(start) || !Number.isInteger(end)) return null;
      if (start <= 0 || end <= 0) return null;
      if (start > end) [start, end] = [end, start];
      return { start, end };
    }

    function startQuiz() {
      const store = loadStore();
      let picked = [];

      if (selectedMode === "range") {
        const parsed = parseQuestionRange($("questionRange").value);
        if (!parsed) {
          alert("請輸入指定題號區間，例如：1-10");
          return;
        }
        picked = QUESTIONS
          .filter(q => q.id >= parsed.start && q.id <= parsed.end)
          .sort((a, b) => a.id - b.id);
        if (picked.length === 0) {
          alert(`找不到題號 ${parsed.start}-${parsed.end} 的題目。`);
          return;
        }
      } else {
        const pool = eligibleQuestions(store);
        if (pool.length === 0) {
          alert("你已經把全部題目都連續答對 3 次了！想重新練習的話，可以按「重置全部進度」，或使用「指定題號區間」練已掌握題目。");
          return;
        }

        let count = parseInt($("questionCount").value, 10);
        if (!Number.isFinite(count) || count <= 0) count = 30;
        count = Math.min(count, pool.length);

        picked = selectedMode === "random"
          ? shuffle(pool).slice(0, count)
          : [...pool].sort((a, b) => a.id - b.id).slice(0, count);
      }

      currentExam = {
        mode: selectedMode,
        questions: picked,
        answers: {},
        startedAt: new Date().toISOString()
      };
      currentPage = 0;
      $("missingBox").classList.add("hidden");
      setView("quiz");
      renderQuiz();
    }

    function renderQuiz() {
      if (!currentExam) return;
      const total = currentExam.questions.length;
      const pageCount = Math.ceil(total / PAGE_SIZE);
      const start = currentPage * PAGE_SIZE;
      const pageQuestions = currentExam.questions.slice(start, start + PAGE_SIZE);
      const answeredCount = Object.keys(currentExam.answers).length;

      $("quizTitle").textContent = modeLabel(currentExam.mode);
      $("quizMeta").textContent = `本次 ${total} 題 · 已作答 ${answeredCount} 題 · 第 ${currentPage + 1} / ${pageCount} 頁`;
      $("pageInfo").textContent = `目前顯示第 ${start + 1}–${Math.min(start + PAGE_SIZE, total)} 題`;
      $("prevPageBtn").disabled = currentPage === 0;
      $("nextPageBtn").disabled = currentPage >= pageCount - 1;

      $("pageDots").innerHTML = Array.from({ length: pageCount }, (_, idx) => {
        return `<button class="page-dot ${idx === currentPage ? "active" : ""}" type="button" data-page="${idx}">${idx + 1}</button>`;
      }).join("");

      $("questionsContainer").innerHTML = pageQuestions.map((q, idx) => renderQuestion(q, start + idx)).join("");

      document.querySelectorAll(".page-dot").forEach(btn => {
        btn.addEventListener("click", () => {
          currentPage = Number(btn.dataset.page);
          $("missingBox").classList.add("hidden");
          renderQuiz();
        });
      });

      document.querySelectorAll("[data-answer]").forEach(btn => {
        btn.addEventListener("click", () => {
          const qid = btn.dataset.qid;
          const answer = btn.dataset.answer;
          currentExam.answers[qid] = answer;
          renderQuiz();
        });
      });
    }

    function renderQuestion(q, index) {
      const selected = currentExam.answers[String(q.id)];
      const options = Object.entries(q.options).map(([key, text]) => {
        const isSelected = selected === key;
        return `<button class="option ${isSelected ? "selected" : ""}" type="button" data-qid="${q.id}" data-answer="${key}">
          <span class="option-key">${escapeHtml(key)}</span>
          <span class="option-text">${escapeHtml(text)}</span>
        </button>`;
      }).join("");

      return `<article class="question-card" id="q-${q.id}">
        <div class="q-head">
          <span>本次第 ${index + 1} 題</span>
          <span>原題號 ${q.id}</span>
        </div>
        <div class="q-title">${escapeHtml(q.question)}</div>
        <div class="options">${options}</div>
      </article>`;
    }

    function goPage(delta) {
      if (!currentExam) return;
      const pageCount = Math.ceil(currentExam.questions.length / PAGE_SIZE);
      currentPage = Math.max(0, Math.min(pageCount - 1, currentPage + delta));
      $("missingBox").classList.add("hidden");
      renderQuiz();
    }

    function submitQuiz(force = false) {
      if (!currentExam) return;
      const missing = currentExam.questions.filter(q => !currentExam.answers[String(q.id)]);
      if (missing.length && !force) {
        showMissing(missing);
        return;
      }
      gradeQuiz();
    }

    function showMissing(missing) {
      $("missingBox").classList.remove("hidden");
      $("missingList").innerHTML = missing.map(q => `<button class="mini-btn" type="button" data-jump="${q.id}">題號 ${q.id}</button>`).join("");
      document.querySelectorAll("[data-jump]").forEach(btn => {
        btn.addEventListener("click", () => {
          const qid = Number(btn.dataset.jump);
          const idx = currentExam.questions.findIndex(q => q.id === qid);
          currentPage = Math.floor(idx / PAGE_SIZE);
          renderQuiz();
          setTimeout(() => {
            const target = document.getElementById(`q-${qid}`);
            if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
          }, 60);
        });
      });
      $("missingBox").scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function gradeQuiz() {
      const store = loadStore();
      const details = currentExam.questions.map(q => {
        const userAnswer = currentExam.answers[String(q.id)] || "";
        const correct = userAnswer === q.answer;
        const p = getProgress(store, q.id);
        p.attempts += 1;
        store.totalAnswered += 1;
        if (correct) {
          p.correct += 1;
          p.correctStreak = (p.correctStreak || 0) + 1;
          store.totalCorrect += 1;
        } else {
          p.wrongEver = true;
          p.correctStreak = 0;
        }
        return {
          question: q,
          userAnswer,
          correct,
          updatedStreak: p.correctStreak || 0,
          mastered: (p.correctStreak || 0) >= MASTER_STREAK
        };
      });

      const score = details.filter(d => d.correct).length;
      const total = details.length;
      const percentNum = total ? Math.round((score / total) * 100) : 0;
      store.lastScore = {
        score,
        total,
        percent: `${percentNum}%`,
        date: new Date().toISOString()
      };
      saveStore(store);

      lastResult = {
        mode: currentExam.mode,
        details,
        score,
        total,
        percent: percentNum,
        date: store.lastScore.date
      };
      resultWrongOnly = false;
      currentExam = null;
      setView("result");
      renderResult();
    }

    function renderResult() {
      if (!lastResult) return;
      const wrong = lastResult.details.filter(d => !d.correct);
      $("resultDate").textContent = `${modeLabel(lastResult.mode)} · ${formatDate(lastResult.date)}`;
      $("resultSummary").innerHTML = [
        resultStat("分數", `${lastResult.score} / ${lastResult.total}`),
        resultStat("答對率", `${lastResult.percent}%`),
        resultStat("本次錯題", wrong.length),
        resultStat("新掌握題", lastResult.details.filter(d => d.mastered && d.correct).length)
      ].join("");

      $("toggleWrongBtn").textContent = resultWrongOnly ? "顯示全部題目" : "只顯示本次錯題";

      const list = resultWrongOnly ? wrong : lastResult.details;
      if (list.length === 0) {
        $("resultList").innerHTML = `<div class="empty-state">這次沒有錯題，好棒！</div>`;
        return;
      }

      $("resultList").innerHTML = list.map(renderResultItem).join("");
    }

    function resultStat(label, value) {
      return `<div class="result-card">
        <div class="label">${escapeHtml(label)}</div>
        <div class="value">${escapeHtml(String(value))}</div>
      </div>`;
    }

    function renderResultItem(detail) {
      const q = detail.question;
      const options = Object.entries(q.options).map(([key, text]) => {
        const isCorrect = key === q.answer;
        const isUserWrong = key === detail.userAnswer && !detail.correct;
        const tag = isCorrect ? `<span class="badge ok">正解</span>` : (isUserWrong ? `<span class="badge bad">你的答案</span>` : "");
        return `<div class="result-option ${isCorrect ? "is-correct" : ""} ${isUserWrong ? "is-user-wrong" : ""}">
          <span class="option-key">${escapeHtml(key)}</span>
          <span>${escapeHtml(text)}</span>
          ${tag}
        </div>`;
      }).join("");

      return `<article class="result-item ${detail.correct ? "correct" : "wrong"}">
        <div class="q-head">
          <span>原題號 ${q.id}</span>
          <span class="badge ${detail.correct ? "ok" : "bad"}">${detail.correct ? "答對" : "答錯"}</span>
        </div>
        <div class="q-title">${escapeHtml(q.question)}</div>
        <div>${options}</div>
        <div class="answer-line">
          <span>你的答案：<strong>${detail.userAnswer ? escapeHtml(detail.userAnswer) : "未作答"}</strong></span>
          <span>正確答案：<strong>${escapeHtml(q.answer)}</strong></span>
          <span>連續答對：<strong>${detail.updatedStreak} / ${MASTER_STREAK}</strong></span>
          ${detail.mastered ? '<span class="badge ok">已掌握，之後不再出現</span>' : ''}
        </div>
      </article>`;
    }

    function resetAll() {
      const ok = confirm("確定要重置全部進度嗎？答題紀錄、答對率、錯題狀態、已掌握題目都會清空。");
      if (!ok) return;
      localStorage.removeItem(STORAGE_KEY);
      currentExam = null;
      lastResult = null;
      resultWrongOnly = false;
      setView("home");
      renderDashboard();
    }

    document.addEventListener("DOMContentLoaded", () => {
      renderDashboard();

      document.querySelectorAll(".choice-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          selectedMode = btn.dataset.mode;
          document.querySelectorAll(".choice-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          updateModeUI();
        });
      });
      updateModeUI();

      document.querySelectorAll("[data-count]").forEach(btn => {
        btn.addEventListener("click", () => {
          $("questionCount").value = btn.dataset.count;
        });
      });

      $("allRemainingBtn").addEventListener("click", () => {
        $("questionCount").value = eligibleQuestions(loadStore()).length;
      });

      $("startBtn").addEventListener("click", startQuiz);
      $("resetBtn").addEventListener("click", resetAll);
      $("prevPageBtn").addEventListener("click", () => goPage(-1));
      $("nextPageBtn").addEventListener("click", () => goPage(1));
      $("submitBtn").addEventListener("click", () => submitQuiz(false));
      $("forceSubmitBtn").addEventListener("click", () => submitQuiz(true));
      $("hideMissingBtn").addEventListener("click", () => $("missingBox").classList.add("hidden"));

      $("quitBtn").addEventListener("click", () => {
        const ok = confirm("確定要返回首頁嗎？這次尚未交卷的答案不會保存。");
        if (!ok) return;
        currentExam = null;
        setView("home");
        renderDashboard();
      });

      $("backHomeBtn").addEventListener("click", () => {
        setView("home");
        renderDashboard();
      });

      $("toggleWrongBtn").addEventListener("click", () => {
        resultWrongOnly = !resultWrongOnly;
        renderResult();
      });

      $("restartSameModeBtn").addEventListener("click", () => {
        selectedMode = lastResult?.mode || selectedMode;
        document.querySelectorAll(".choice-btn").forEach(b => b.classList.toggle("active", b.dataset.mode === selectedMode));
        updateModeUI();
        setView("home");
        renderDashboard();
        setTimeout(startQuiz, 80);
      });
    });
  </script>
